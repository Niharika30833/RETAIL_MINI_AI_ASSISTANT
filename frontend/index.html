<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta charset="UTF-8">
    <title>Retail Chatbot</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f5f5f5;
        }

        h2 {
            color: #333;
        }

        input {
            padding: 10px;
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        <canvas id="salesChart" width="400" height="200"></canvas>

        .send-btn {
            background-color: #007bff;
            color: white;
        }

        .sales-btn {
            background-color: green;
            color: white;
        }

        #response, #sales {
            margin-top: 20px;
            font-size: 18px;
            color: #444;
        }
    </style>
</head>

<body>

<h2>🛒 Retail Intelligence Chatbot</h2>

<input type="text" id="input" placeholder="Ask about products, sales, stock...">
<button class="send-btn" onclick="send()">Send</button>

<p id="response"></p>

<button class="sales-btn" onclick="getSales()">📊 Show Sales</button>
<p id="sales"></p>

<script src="app.js"></script>

</body>
</html>
